<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Grid Design</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

    <div class="main">

        <div class="left">

            <p class="about">✧ &nbsp;&nbsp;About Me</p>

            <div class="side-menu">
                <p>Clients</p>
                <p>Research</p>
                <p>Portfolio</p>
                <p>Podcast</p>
            </div>

            <div class="circle">

                <img class="person" src="./assets/person.png" alt="person" width="350">
            </div>
            <div class="info">
                <h2><span>Im,</span><br>Jon<br>Daniel</h2>
                <p>inquiry@jondaniel.design <i class="fa-regular fa-envelope"></i></p>
            </div>

            <img class="disk" src="./assets/disk.png" alt="disk">

        </div>

        <div class="right">

            <div class="heading">
                <h1>Portfolio</h1>
            </div>

            <div class="video">
                <img src="./assets/bird.jpg" alt="">
                <div class="play">▶</div>
            </div>

            <div class="stats">
                <div class="projects">
                    <h3>251</h3>
                    <p>Projects</p>
                </div>

                <div class="awards">
                    <h3>156</h3>
                    <p>Awards</p>
                </div>
            </div>

            <div class="clients-box">
                <h2><i class="fa-brands fa-apple"></i></h2>
                <p>Clients</p>
            </div>

            <div class="sphere">
                <div class="ball">
                    <img src="./assets/ball.webp" alt="ball" width="110">
                </div>
            </div>

            <div class="award-box">
                <h3>172</h3>
                <p>Global Design <br>Awards.</p>
            </div>

        </div>

    </div>

</body>

</html>
