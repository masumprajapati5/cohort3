<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design 1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main">
        <nav>
            <div class="logo">
                <img src="./assests/logo.png" alt="logo" width="100">
                <span>ScaleX</span>
            </div>
            <div class="links">
                <a href="#">Home</a>
                <a href="#">About Us</a>
                <a href="#">Blogs</a>
                <a href="#">Contact Us</a>
            </div>
            <button>Get Started</button>
        </nav>
        <div class="hero">
            <h1>Insights & Blogs</h1>
            <div class="categories">
                <p class="active">All</p>
                <p class="cat">Tech</p>
                <p class="cat">Saas</p>
                <p class="cat">Marketing</p>
            </div>
        </div>
        <div class="cards">
            <div class="card">
                <img src="./assests/img1.png" alt="img1">
                <div class="content">
                    <p>Tech</p>
                    <h2>The Ultimate Guide To<br /> SaaS Marketing</h2>
                    <p class="date">May 23, 2025</p>
                </div>
            </div>
            <div class="card">
                <img src="./assests/img2.png" alt="img2">
                <div class="content">
                    <p>Saas</p>
                    <h2>5 Key Trends In Saas<br /> Growth For 2025</h2>
                    <p class="date">May 23, 2025</p>
                </div>
            </div>
            <div class="card">
                <img src="./assests/img3.png" alt="img3">
                <div class="content">
                    <p>Marketing</p>
                    <h2>How Data-Driven<br />Strategies Are Important</h2>
                    <p class="date">May 23, 2025</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
