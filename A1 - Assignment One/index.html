<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikachu Design</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body>
    <div class="container">
        <img src="./assets/pikachu.png" alt="main" class="main">
        <div class="left">
            <img src="./assets/logo.png" alt="logo" class="logo" width="100">
            <p class="first">Pokemon Gen I</p>
            <h1>Pikachu</h1>
            <p class="description">Pikachu is an Electric-type Pokémon introduced in Generation I. Pikachu are small,
                chubby, and incredibly cute mouse-like Pokémon.They are almost completely covered by yellow fur.</p>
            <h3>⸻ &nbsp; &nbsp; 01/08</h3>
            <img src="./assets/ball.png" alt="ball" class="ball" width="220">
        </div>
        <div class="right">
            <i class="ri-menu-fill" class="menu"></i>
            <div class="dots">
                <div id="black"></div>
                <div class="yellow"></div>
                <div class="yellow"></div>
                <div class="yellow"></div>
                <div class="yellow"></div>
            </div>
        </div>
    </div>
</body>

</html>
