<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design 2</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="main-wrapper">
        <nav class="navbar container">
            <div class="logo">
                <img src="assets/hero.png" alt="Logo">
            </div>
            <div class="nav-links">
                <a href="#">About</a>
                <a href="#" class="active">Watch now</a>
                <a href="#">Actors</a>
                <a href="#">Contact</a>
            </div>
            <div class="menu-icon">
                <i class="ri-menu-fill"></i>
            </div>
        </nav>

        <section class="hero-body container">
            <div class="hero-content">
                <div class="title-image">
                    <img src="assets/hero.png" alt="Squid Game">
                </div>
                <p class="description">
                    Action / Thriller / Drama Series directed by Dong-hyuk Hwang<br>
                    Season 1: 9 Episodes
                </p>
                <div class="button-group">
                    <a href="#" class="btn btn-play">
                        <div class="icon-circle"><i class="ri-play-fill"></i></div>
                        <span>Play Now</span>
                    </a>
                    <a href="#" class="btn btn-trailer">
                        <i class="ri-play-line"></i>
                        <span>Watch Trailer</span>
                    </a>
                </div>
            </div>

            <div class="person-wrapper">
                <img src="assets/right.png" alt="person" class="person-img">
            </div>

            <div class="scroll-indicator">
                <span class="scroll-text">SCROLL</span>
                <div class="scroll-line"></div>
            </div>

            <div class="social-icons">
                <a href="#"><i class="ri-twitter-line"></i></a>
                <a href="#"><i class="ri-instagram-line"></i></a>
                <a href="#"><i class="ri-facebook-fill"></i></a>
            </div>
        </section>

        <section class="bottom-cards-section">
            <div class="container cards-wrapper">
                <div class="card">
                    <img src="assets/1.webp" alt="1">
                    <div class="play-overlay"><i class="ri-play-fill"></i></div>
                </div>
                <div class="card">
                    <img src="assets/2.webp" alt="2">
                    <div class="play-overlay"><i class="ri-play-fill"></i></div>
                </div>
                <div class="card">
                    <img src="assets/3.png" alt="3">
                    <div class="play-overlay"><i class="ri-play-fill"></i></div>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
